<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neil's View: The Shoreline Sanctuary</title>
    
    <!-- React, ReactDOM, and Babel for the "Built-in React Engine" -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Styling & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --red: #dc2626; --mahogany: #4a3426; }
        body { background-color: #000; color: #f5efe8; margin: 0; font-family: 'Inter', sans-serif; }
        
        .main-bg {
            position: fixed; inset: 0; z-index: -2;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url("https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&q=80&w=2000") center/cover fixed;
        }

        /* Baaboi Style Glass Patterns */
        .reeded-glass {
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 6px), radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 80%);
            background-size: 8px 100%, 100% 100%;
        }

        .bookshelf-glass {
            background-image: repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 2px, transparent 2px, transparent 42px), repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 10px, rgba(255,255,255,0.04) 11px, transparent 11px, transparent 42px), linear-gradient(0deg, rgba(0,0,0,0.4) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.4) 100%);
            background-size: 100% 100%, 100% 100%, 100% 33.3%;
        }

        /* Typography */
        .baaboi-serif { font-family: 'Playfair Display', serif; }
        .drop-cap::first-letter {
            font-size: 5rem; font-weight: 900; float: left; margin-right: 1rem; line-height: 0.85; color: var(--red); font-family: 'Playfair Display', serif;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @keyframes riseVapor {
            0% { transform: translateY(10px) scale(0.8); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translateY(-70px) scale(1.5); opacity: 0; }
        }
        .vapor-wisp { animation: riseVapor 5s infinite ease-in-out; }
    </style>
</head>
<body>
    <div class="main-bg"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- COMPONENTS ---

        const SensoryCup = ({ isSmall = false }) => {
            const scale = isSmall ? 'scale-50' : 'scale-100';
            return (
                <div className={`relative flex flex-col items-center ${scale} transition-transform duration-1000`}>
                    <div className="absolute -top-24">
                        <svg width="150" height="150" viewBox="0 0 150 150">
                            <filter id="vF"><feGaussianBlur stdDeviation="5"/></filter>
                            <g filter="url(#vF)">
                                <path d="M60,120 C50,90 70,60 60,30" fill="none" stroke="white" strokeWidth="8" className="vapor-wisp opacity-30"/>
                                <path d="M75,120 C85,85 65,55 75,25" fill="none" stroke="white" strokeWidth="10" className="vapor-wisp opacity-40" style={{animationDelay: '1.2s'}}/>
                                <path d="M90,120 C100,90 80,60 90,30" fill="none" stroke="white" strokeWidth="7" className="vapor-wisp opacity-30" style={{animationDelay: '0.6s'}}/>
                            </g>
                        </svg>
                    </div>
                    <div className="relative flex items-center translate-y-4">
                        <div className="w-36 h-40 bg-gradient-to-br from-[#F5E6BE] via-[#D4AF37] to-[#8B7500] rounded-b-[44%] rounded-t-2xl shadow-[0_40px_80px_rgba(0,0,0,0.9)] relative overflow-hidden z-20">
                            <div className="absolute inset-0 bg-gradient-to-tr from-transparent via-white/40 to-transparent opacity-60"></div>
                            <div className="absolute bottom-0 w-full h-16"><svg viewBox="0 0 100 40" preserveAspectRatio="none" className="w-full h-full opacity-90"><path d="M0,40 L12,18 L28,32 L48,8 L68,28 L88,15 L100,40 Z" fill="#1a0f0a"/></svg></div>
                        </div>
                        <div className="absolute -right-12 top-10 w-16 h-24 z-10">
                            <div className="w-full h-full bg-gradient-to-r from-[#D4AF37] via-[#B8860B] to-[#8B7500] rounded-[28px] shadow-2xl"></div>
                        </div>
                    </div>
                </div>
            );
        };

        const BookCard = ({ book, onClick }) => {
            const [imgUrl, setImgUrl] = useState(null);
            
            useEffect(() => {
                const fetchImg = async () => {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ instances: { prompt: book.prompt || book.title }, parameters: { sampleCount: 1 } })
                        });
                        const res = await response.json();
                        if (res.predictions?.[0]?.bytesBase64Encoded) setImgUrl(`data:image/png;base64,${res.predictions[0].bytesBase64Encoded}`);
                    } catch (e) { setImgUrl("https://images.unsplash.com/photo-1516979187457-637abb4f9353?q=80&w=800"); }
                };
                fetchImg();
            }, [book]);

            return (
                <div onClick={onClick} className="bg-black/80 border-t-[8px] border-red-700 p-10 cursor-pointer hover:bg-white/5 transition-all shadow-2xl group relative overflow-hidden">
                    <div className="aspect-[2/3] mb-10 bg-white/5 relative flex items-center justify-center overflow-hidden">
                        {imgUrl ? <img src={imgUrl} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" /> : <div className="animate-pulse text-gold">Loading...</div>}
                    </div>
                    <h3 className="text-2xl baaboi-serif text-white italic mb-4 leading-tight">{book.title}</h3>
                    <p className="font-black uppercase tracking-widest text-[10px] text-white/40">{book.author}</p>
                </div>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [activeTab, setActiveTab] = useState('favorites');
            const [selectedBook, setSelectedBook] = useState(null);

            const DATA = useMemo(() => ({
                favorites: [
                    { title: "Sherlock Holmes", author: "Sir Arthur Conan Doyle", prompt: "Victorian London gaslight 221B Baker Street silhouette.", summary: "In the gaslit gloom of Victorian London, Arthur Conan Doyle introduces a mind that operates with the cold, precise machinery of a counting-house. Sherlock Holmes is not just a detective; he is a force of pure observation, reminding us that we see, but we do not observe. Every cigar ash and silent look is a syllable in the language of truth." },
                    { title: "Thief of Time", author: "Terry Pratchett", prompt: "Clockwork landscape saffron monks surreal fantasy oil painting.", summary: "Wen the Eternally Surprised stood on a mountain and made some remark about the nature of time... Terry Pratchett weaves a brilliant tapestry of the Monks of History managing the ticking of the universe. It is a story where the end of the world is just another Tuesday, examining humanity through the eyes of those who manage the flow of hours." },
                    { title: "The Namesake", author: "Jhumpa Lahiri", prompt: "Realistic literary oil painting portrait of author Jhumpa Lahiri.", summary: "For Ashima Ganguli, life in Cambridge, Massachusetts, is a series of arrivals and departures that leave her heart adrift. Jhumpa Lahiri paints a masterpiece of the immigrant experience through the eyes of Gogol Ganguli. It is a story of names that feel like heavy coats, and the quiet, persistent ache of wanting to belong." },
                    { title: "The Other Side of Midnight", author: "Sidney Sheldon", prompt: "Glamorous 1940s Paris cinematic noir silhouette beautiful woman.", summary: "A sweeping tale of revenge and obsession that spans decades and continents. Sheldon masterfully weaves the lives of a vengeful French actress and a dashing American pilot into a web of passion and betrayal. 'Passion is the only thing that matters,' the narrative pulses across the postwar European landscape, where love is a weapon and beauty is a lethal trap." },
                    { title: "The Carpetbaggers", author: "Harold Robbins", prompt: "1930s Hollywood studio bold masculine gold charcoal.", summary: "The definitive saga of power, industry, and uninhibited desire. Loosely inspired by the life of Howard Hughes, Robbins chronicles the ruthless ascent of Jonas Cord. It is a visceral exploration of the 'men who took the world apart to see what made it tick,' written with a raw, driving intensity that redefined the modern bestseller." },
                    { title: "Krishnamurti's Notebook", author: "J. Krishnamurti", summary: "In these pages, Krishnamurti records a state of mind that is 'beyond the reach of thought.' It is not a textbook of philosophy, but a living breath of awareness. 'The air was very still,' he writes, 'and the silence was not a thing to be measured by the mind.' A testament to a consciousness that sees the movement of life." },
                    { title: "The Tao of Physics", author: "Fritjof Capra", summary: "Capra explores the profound bridge between the rhythmic dance of subatomic particles and the ancient wisdom of Eastern mysticism. He reveals a universe that is not a collection of separate objects, but a complicated web of relations. 'The world view of the modern physicist is extremely similar to that of the Eastern mystic.'" },
                    { title: "E = mc²", author: "David Bodanis", summary: "The story of the most famous equation in history is not merely one of mathematics, but of human obsession and cosmic revelation. Bodanis brings to life the long lineage of thinkers who paved the way for Einstein. It is a biography of an idea that fundamentally altered our understanding of reality." },
                    { title: "A Bridge Across Forever", author: "Richard Bach", summary: "'A soulmate is someone who has locks that fit our keys, and keys to fit our locks.' Bach’s journey is a soaring exploration of love that transcends the boundaries of time and space. He reminds us that we are travelers on a path of learning, where the greatest mastery is found in the connection between spirits." },
                    { title: "A Short History of Nearly Everything", author: "Bill Bryson", summary: "With a curiosity that spans from the Big Bang to the discovery of the atom, Bryson takes us on a journey through the staggering improbability of our own existence. He chronicles the lives of eccentric geniuses and the immense, quiet forces of nature, reminding us that we are all, quite literally, made of stardust." },
                    { title: "Jonathan Livingston Seagull", author: "Richard Bach", summary: "Heaven is not a place, and it is not a time. Heaven is being perfect. Jonathan is a gull who refuses to accept the mundane limits of the flock. While others fly only to find food, Jonathan flies to discover the truth of flight itself. It is a soaring fable about the courage to follow one's own mastery." }
                ],
                nyt: [{ title: "The Women", author: "Kristin Hannah", summary: "A tribute to the forgotten heroism of the nurses who served in the Vietnam War." }],
                pulitzer: [{ title: "James", author: "Percival Everett", summary: "Winner of the 2025 Pulitzer Prize for Fiction. A masterpiece of voice." }],
                newyorker: [{ title: "Vigil", author: "George Saunders", summary: "Compassionate exploration of attention and care in a society fractured by noise." }]
            }), []);

            const activeList = DATA[activeTab] || DATA.favorites;

            if (selectedBook) {
                return (
                    <div className="fixed inset-0 z-[300] bg-black/98 backdrop-blur-3xl overflow-y-auto pt-32 pb-40 px-6">
                        <button onClick={() => setSelectedBook(null)} className="fixed top-8 left-6 md:left-20 z-[400] flex items-center gap-4 bg-red-700 text-white px-8 py-5 font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-red-600 active:scale-95 transition-all">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            BACK TO LIST
                        </button>
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row gap-20">
                            <div className="md:w-2/5 aspect-[2/3] bg-white/5 border border-white/10 shadow-2xl flex items-center justify-center">
                                <span className="text-gold opacity-30 baaboi-serif italic">Neil's Selection</span>
                            </div>
                            <div className="flex-1">
                                <h2 className="text-5xl md:text-8xl baaboi-serif italic text-white mb-8 border-l-[16px] border-red-700 pl-10 leading-none">{selectedBook.title}</h2>
                                <p className="font-black uppercase tracking-[0.5em] text-2xl text-[#D4AF37] mb-16">Author: {selectedBook.author}</p>
                                <p className="text-3xl md:text-4xl font-light italic leading-relaxed text-[#f5efe8]/90 drop-cap">{selectedBook.summary}</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 left-0 right-0 z-[200] bg-black border-b-[6px] border-[#4a3426] h-20 shadow-2xl">
                        <div className="max-w-7xl mx-auto flex items-center justify-start md:justify-center overflow-x-auto no-scrollbar px-4 h-full">
                            <div className="flex flex-nowrap h-full">
                                {[
                                    { id: 'favorites', label: 'My Corner', icon: '❤️' },
                                    { id: 'nyt', label: 'NYT Best', icon: '⭐' },
                                    { id: 'pulitzer', label: 'Pulitzer', icon: '🏆' },
                                    { id: 'newyorker', label: 'New Yorker', icon: '🏛️' }
                                ].map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`h-full px-10 font-black uppercase text-[11px] tracking-widest flex items-center gap-3 transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white/5 border-b-[4px] border-red-700 text-white' : 'text-white/40'}`}
                                    >
                                        <span>{tab.icon}</span> {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto pt-32 px-4 pb-20">
                        <header className="relative mb-24 rounded-sm overflow-hidden border-x-[1px] border-b-[10px] border-[#4a3426] bg-black shadow-2xl">
                            <div className="absolute inset-0 z-0">
                                <img src="https://images.unsplash.com/photo-1493106819501-66d381c446a1?q=80" className="w-full h-full object-cover brightness-[0.6]" />
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent via-black/30 to-black/90"></div>
                                <div className="absolute inset-0 opacity-90 reeded-glass"></div>
                            </div>
                            <div className="relative z-10 p-16 md:p-32 flex flex-col items-center text-center">
                                <h1 className="text-3xl md:text-5xl baaboi-serif italic text-white mb-6 uppercase tracking-[1.2em] pl-[1.2em]">Neil's <span className="text-red-700 not-italic">View</span></h1>
                                <div className="h-1 w-24 bg-red-700 mx-auto mb-8"></div>
                                <p className="text-[12px] font-black uppercase tracking-[0.8em] pl-[0.8em] text-white/70 mb-12">The Shoreline Sanctuary</p>
                                <p className="text-2xl md:text-4xl font-light italic leading-snug text-[#D4AF37] mb-12 max-w-5xl">
                                    "Books, coffee, sun, waves hitting the shoreline rhythmically....and <span className="text-red-700 not-italic font-black lowercase tracking-widest">a bit of love.</span>"
                                </p>
                                <SensoryCup />
                            </div>
                        </header>

                        <div className="grid gap-12 sm:grid-cols-2 lg:grid-cols-3">
                            {activeList.map((book, idx) => (
                                <BookCard key={idx} book={book} onClick={() => setSelectedBook(book)} />
                            ))}
                        </div>

                        <footer className="mt-40 border-t-[20px] border-[#4a3426] relative overflow-hidden min-h-[600px] bg-black">
                            <div className="absolute inset-0 backdrop-blur-[50px] bg-[#1c140f]/90 z-0"></div>
                            <div className="absolute inset-0 opacity-30 bookshelf-glass z-1"></div>
                            <div className="relative z-10 py-48 flex flex-col items-center">
                                <SensoryCup isSmall />
                            </div>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
