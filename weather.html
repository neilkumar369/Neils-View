<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neil's View | Global Weather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-elegant: 'Instrument Serif', serif;
            --font-sans: 'Inter', sans-serif;
        }
        
        body { 
            font-family: var(--font-sans);
            background: #020617;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            background-attachment: fixed;
            padding-top: 60px; /* Space for the fixed baseline bar */
        }

        .elegant-text { font-family: var(--font-elegant); }
        .romantic-text { 
            font-family: var(--font-elegant); 
            font-style: italic; 
            font-weight: 400;
        }

        /* NEIL'S VIEW: Refined Dark Ivory Metallic with Gold Sheen */
        .metallic-dark-ivory-gold {
            background: linear-gradient(135deg, #a8a29e 0%, #78716c 30%, #d4af37 50%, #fafaf9 55%, #78716c 70%, #44403c 100%); 
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 400;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.8));
            animation: metallicSheen 10s infinite linear;
        }

        .subtitle-light-gold {
            font-family: var(--font-elegant);
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 30%, #f59e0b 50%, #fde68a 70%, #fef3c7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 300;
            font-style: italic;
            animation: metallicSheen 12s infinite linear;
        }

        .metallic-gold-black {
            background: linear-gradient(135deg, #000000 0%, #262626 45%, #d4af37 50%, #262626 55%, #000000 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            filter: drop-shadow(0 1px 2px rgba(255,255,255,0.1));
            animation: metallicSheen 6s infinite linear;
        }

        @keyframes metallicSheen {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .window-pane {
            position: relative;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .frosted-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(28px) saturate(140%);
            -webkit-backdrop-filter: blur(28px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            pointer-events: none;
            z-index: 2;
        }

        .baseline-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .droplets {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.1) 1.5px, transparent 1.5px),
                radial-gradient(circle at 40% 50%, rgba(255,255,255,0.08) 2.5px, transparent 2.5px);
            background-size: 140px 140px;
            opacity: 0.6;
            z-index: 3;
            pointer-events: none;
        }

        .garden-bg {
            position: absolute;
            inset: 0;
            z-index: 1;
            transition: background 2s ease;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(-400px);
            animation: drop-bounce 2.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes drop-bounce {
            0% { transform: translateY(-400px); opacity: 0; }
            40% { opacity: 1; }
            70% { transform: translateY(25px); }
            85% { transform: translateY(-12px); }
            100% { transform: translateY(0); opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.96);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .instruction-fade {
            animation: simpleFadeIn 1.5s ease-out 4s forwards;
            opacity: 0;
        }
        @keyframes simpleFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .back-button { transition: transform 0.3s ease; }
        .back-button:hover { transform: translateX(-5px); }
    </style>
</head>
<body class="p-2 md:p-8">

    <!-- Fixed Baseline Bar -->
    <div id="baseline-bar" class="baseline-bar px-6 opacity-0 transition-opacity duration-1000">
        <div class="flex items-center gap-6 md:gap-12 max-w-7xl w-full justify-between overflow-x-auto no-scrollbar">
            <div class="flex items-center gap-3 shrink-0">
                <span id="baseline-icon" class="text-2xl drop-shadow-md">☀️</span>
                <span class="text-[10px] md:text-xs uppercase font-black tracking-[0.3em] text-white/60">San Diego baseline</span>
            </div>
            <div class="flex items-center gap-8 md:gap-16 shrink-0">
                <div class="text-center">
                    <p class="text-[8px] uppercase font-black text-white/30 tracking-widest mb-0.5">Now</p>
                    <p id="baseline-temp" class="text-xl font-bold tracking-tighter text-white">--°</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] uppercase font-black text-white/30 tracking-widest mb-0.5">Today's High</p>
                    <p id="baseline-high" class="text-xl font-bold tracking-tighter text-white">--°</p>
                </div>
                <div class="text-center">
                    <p class="text-[8px] uppercase font-black text-white/30 tracking-widest mb-0.5">Today's Low</p>
                    <p id="baseline-low" class="text-xl font-bold tracking-tighter text-white/60">--°</p>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="mb-12 h-[380px] rounded-[4rem] window-pane shadow-2xl flex flex-col items-center justify-center text-center">
            <div class="garden-bg" style="background: linear-gradient(135deg, #020617 0%, #1e1b4b 50%, #064e3b 100%);"></div>
            <div class="frosted-overlay"></div>
            <div class="droplets"></div>
            
            <div class="z-10 px-8 relative">
                <span class="text-2xl md:text-4xl subtitle-light-gold tracking-[0.3em] mb-6 block drop-shadow-xl">Atmospheric Perspective</span>
                <h1 id="title-anim" class="text-6xl md:text-8xl elegant-text leading-none"></h1>
                <div class="h-[1px] w-64 bg-gradient-to-r from-transparent via-white/30 to-transparent mx-auto mt-10 mb-8"></div>
                <p class="instruction-fade romantic-text text-3xl md:text-4xl text-orange-100/90 drop-shadow-md">
                    Tap the city pane for details...
                </p>
            </div>
        </header>

        <div id="loader" class="text-center py-16">
            <div class="inline-block h-10 w-10 border-2 border-white/20 border-t-white rounded-full animate-spin mb-6"></div>
            <p id="loader-text" class="elegant-text text-2xl text-white/50 italic">Detecting your location & refining horizons...</p>
        </div>

        <div id="weather-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 opacity-0 transition-opacity duration-1000 pb-12"></div>
    </div>

    <!-- Secondary View Modal -->
    <div id="detail-modal" class="modal" onclick="closeModal()">
        <div id="modal-glass" class="window-pane rounded-[3rem] w-full max-w-2xl overflow-hidden animate-up" onclick="event.stopPropagation()">
            <div class="garden-bg" id="modal-bg"></div>
            <div class="frosted-overlay"></div>
            <div class="droplets"></div>
            
            <div class="modal-container relative z-10">
                <div class="p-6 md:p-8 flex justify-start items-center absolute top-0 left-0 w-full z-20">
                    <button id="modal-back-top" onclick="closeModal()" class="back-button flex items-center gap-3 group">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        <span class="text-xs font-black uppercase tracking-[0.4em]">Back</span>
                    </button>
                </div>

                <div id="modal-content" class="px-6 pb-2 pt-20 md:px-10 text-white flex-grow flex flex-col justify-center gap-3"></div>
                
                <div class="p-6 border-t border-white/10 flex justify-center bg-black/40 backdrop-blur-xl">
                    <button onclick="closeModal()" class="px-14 py-3 bg-white/10 border border-white/30 text-white rounded-full font-bold hover:bg-white/20 transition-all uppercase tracking-[0.6em] text-[9px]">Return to View</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cities = [
            { name: "Redwood City", state: "California", lat: 37.4852, lon: -122.2364 },
            { name: "Hyderabad", state: "India", lat: 17.3850, lon: 78.4867 },
            { name: "Bangalore", state: "India", lat: 12.9716, lon: 77.5946 },
            { name: "Chennai", state: "India", lat: 13.0827, lon: 80.2707 },
            { name: "Springfield", state: "Massachusetts", lat: 42.1015, lon: -72.5898 },
            { name: "Frederick", state: "Maryland", lat: 39.4143, lon: -77.4105 },
            { name: "Chicago", state: "Illinois", lat: 41.8781, lon: -87.6298 },
            { name: "New York City", state: "New York", lat: 40.7128, lon: -74.0060 },
            { name: "San Diego", state: "California", lat: 32.7157, lon: -117.1611 },
            { name: "Phoenix", state: "Arizona", lat: 33.4484, lon: -112.0740 },
            { name: "Austin", state: "Texas", lat: 30.2672, lon: -97.7431 },
            { name: "Gadchiroli", state: "Maharashtra", lat: 20.1844, lon: 79.9944 },
            { name: "Dubai", state: "UAE", lat: 25.2048, lon: 55.2708 },
            { name: "Houston", state: "Texas", lat: 29.7604, lon: -95.3698 },
            { name: "Bossier City", state: "Louisiana", lat: 32.5159, lon: -93.7321 }
        ];

        let weatherStore = [];

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function initialize() {
            initHeader();
            let cityList = [...cities];
            let locationHandled = false;

            const fallbackTimer = setTimeout(() => {
                if (!locationHandled) {
                    locationHandled = true;
                    fetchWeatherData(cityList);
                }
            }, 3000);
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(position => {
                    if (locationHandled) return;
                    clearTimeout(fallbackTimer);
                    locationHandled = true;
                    const uLat = position.coords.latitude;
                    const uLon = position.coords.longitude;
                    let closest = cityList.reduce((prev, curr) => {
                        return calculateDistance(uLat, uLon, prev.lat, prev.lon) < calculateDistance(uLat, uLon, curr.lat, curr.lon) ? prev : curr;
                    });
                    cityList = cityList.filter(c => c.name !== closest.name);
                    cityList.unshift(closest);
                    fetchWeatherData(cityList);
                }, () => {
                    if (locationHandled) return;
                    clearTimeout(fallbackTimer);
                    locationHandled = true;
                    fetchWeatherData(cityList);
                });
            } else {
                clearTimeout(fallbackTimer);
                locationHandled = true;
                fetchWeatherData(cityList);
            }
        }

        function initHeader() {
            const title = "Neil's View";
            const target = document.getElementById('title-anim');
            title.split('').forEach((char, i) => {
                const span = document.createElement('span');
                span.className = 'letter metallic-dark-ivory-gold';
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.animationDelay = `${(i * 0.2) + (Math.random() * 0.4)}s`;
                target.appendChild(span);
            });
        }

        async function fetchWeatherData(list) {
            try {
                const results = await Promise.all(list.map(async (city) => {
                    try {
                        const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current=temperature_2m,relative_humidity_2m,weather_code,is_day&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&temperature_unit=fahrenheit&timezone=auto&forecast_days=7`;
                        const res = await fetch(url);
                        return await res.json();
                    } catch(e) { return null; }
                }));

                weatherStore = list.map((city, i) => {
                    const json = results[i];
                    if (!json) return null;
                    return {
                        ...city,
                        temp: Math.round(json.current.temperature_2m),
                        humidity: json.current.relative_humidity_2m,
                        high: Math.round(json.daily.temperature_2m_max[0]),
                        low: Math.round(json.daily.temperature_2m_min[0]),
                        weatherCode: json.current.weather_code,
                        isDay: json.current.is_day,
                        timezone: json.timezone,
                        dailyMax: json.daily.temperature_2m_max,
                        dailyMin: json.daily.temperature_2m_min,
                        dailyProb: json.daily.precipitation_probability_max
                    };
                }).filter(c => c !== null);

                const sd = weatherStore.find(c => c.name === "San Diego");
                if (sd) {
                    document.getElementById('baseline-temp').textContent = `${sd.temp}°`;
                    document.getElementById('baseline-high').textContent = `${sd.high}°`;
                    document.getElementById('baseline-low').textContent = `${sd.low}°`;
                    document.getElementById('baseline-icon').textContent = getIcon(sd.weatherCode);
                    document.getElementById('baseline-bar').classList.remove('opacity-0');
                }
                renderGrid();
            } catch (err) {
                document.getElementById('loader-text').textContent = "Atmospheric sync failed. Please refresh.";
            }
        }

        function getLocalInfo(tz) {
            const now = new Date();
            return {
                time: new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: true }).format(now),
                date: new Intl.DateTimeFormat('en-US', { timeZone: tz, month: 'short', day: 'numeric', weekday: 'short' }).format(now)
            };
        }

        function getIcon(code) {
            if (code <= 1) return "☀️";
            if (code <= 3) return "⛅";
            if (code <= 48) return "🌫️";
            if (code <= 67) return "🌧️";
            if (code <= 77) return "❄️";
            if (code <= 82) return "🌦️";
            return "⛈️";
        }

        function renderGrid() {
            const grid = document.getElementById('weather-grid');
            grid.innerHTML = '';
            weatherStore.forEach((city, index) => {
                const info = getLocalInfo(city.timezone);
                const themeBg = getWeatherTheme(city.weatherCode, city.isDay, city.temp);
                const card = document.createElement('div');
                card.className = `window-pane p-10 rounded-[3.5rem] cursor-pointer animate-up flex flex-col justify-between min-h-[440px] shadow-2xl`;
                card.style.animationDelay = `${(index * 0.1) + 1.5}s`;
                card.onclick = () => showDetails(index);
                card.innerHTML = `
                    <div class="garden-bg" style="background: ${themeBg}"></div>
                    <div class="frosted-overlay"></div><div class="droplets"></div>
                    <div class="flex justify-between items-start mb-6 relative z-10">
                        <div>
                            <h2 class="text-4xl elegant-text leading-tight mb-1 metallic-gold-black">${city.name}</h2>
                            <p class="text-[11px] tracking-[0.5em] uppercase mb-4 metallic-gold-black opacity-90">${city.state}</p>
                            <div class="bg-black/30 py-1 px-4 rounded-full inline-block border border-white/10 backdrop-blur-md">
                                <span class="text-[10px] font-bold tracking-widest text-white uppercase">${info.time}</span>
                            </div>
                        </div>
                        <span class="text-5xl filter drop-shadow-2xl grayscale-[0.2]">${getIcon(city.weatherCode)}</span>
                    </div>
                    <div class="mt-auto relative z-10">
                        <div class="flex items-end justify-between border-b border-white/20 pb-6 mb-6">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-white/40 uppercase mb-1">Now</span>
                                <span class="text-7xl elegant-text leading-none text-white drop-shadow-xl">${city.temp}°</span>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-white/40 uppercase mb-1">Humidity</p>
                                <p class="text-2xl font-light text-white">${city.humidity}%</p>
                            </div>
                        </div>
                        <div class="flex justify-between px-1">
                            <div class="flex flex-col"><span class="text-[9px] uppercase tracking-[0.3em] text-white/50 font-black">High Today</span><span class="text-xl font-bold text-white">${city.high}°</span></div>
                            <div class="flex flex-col text-right"><span class="text-[9px] uppercase tracking-[0.3em] text-white/50 font-black">Low Today</span><span class="text-xl font-medium text-white/60">${city.low}°</span></div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('loader').classList.add('hidden');
            grid.classList.remove('opacity-0');
        }

        function getWeatherTheme(code, isDay, temp) {
            if (temp > 105) return 'linear-gradient(135deg, #7f1d1d 0%, #dc2626 40%, #451a03 100%)'; 
            if (temp > 99) return 'linear-gradient(135deg, #991b1b 0%, #ea580c 60%, #451a03 100%)'; 
            if (temp > 89) return 'linear-gradient(135deg, #d97706 0%, #fcd34d 50%, #064e3b 100%)'; 
            if (code <= 1) return isDay ? 'linear-gradient(135deg, #fde047 0%, #10b981 100%)' : 'linear-gradient(135deg, #0f172a 0%, #064e3b 100%)';
            return 'linear-gradient(135deg, #334155 0%, #0f172a 50%, #14532d 100%)';
        }

        function showDetails(index) {
            const city = weatherStore[index];
            const info = getLocalInfo(city.timezone);
            const modal = document.getElementById('detail-modal');
            const content = document.getElementById('modal-content');
            const modalBg = document.getElementById('modal-bg');
            const themeBg = getWeatherTheme(city.weatherCode, city.isDay, city.temp);
            modalBg.style.background = themeBg;

            const isLightBg = (city.temp > 89 && city.isDay) || (city.weatherCode <= 1 && city.isDay);
            const textContrast = isLightBg ? 'text-black/80' : 'text-white/90';
            const labelContrast = isLightBg ? 'text-black/50' : 'text-white/40';
            
            document.getElementById('modal-back-top').className = `back-button flex items-center gap-3 group ${isLightBg ? 'text-black/70' : 'text-white/60'}`;

            const dates = [];
            const baseDate = new Date();
            for(let i=1; i<=3; i++) {
                const d = new Date(baseDate); d.setDate(d.getDate() + i);
                dates.push({
                    day: new Intl.DateTimeFormat('en-US', { weekday: 'short', timeZone: city.timezone }).format(d),
                    date: new Intl.DateTimeFormat('en-US', { month: 'short', day: 'numeric', timeZone: city.timezone }).format(d)
                });
            }

            const outlookColor = isLightBg ? 'text-emerald-800' : 'text-emerald-300';

            content.innerHTML = `
                <div class="text-center mb-2">
                    <span class="text-4xl md:text-5xl mb-1 block drop-shadow-2xl">${getIcon(city.weatherCode)}</span>
                    <h2 class="text-3xl md:text-5xl elegant-text mb-1 metallic-gold-black leading-tight">${city.name}</h2>
                    <div class="flex items-center justify-center gap-4 ${textContrast} text-[22px] md:text-[26px] font-black tracking-[0.2em] uppercase">
                        <span>${info.time}</span><div class="w-2.5 h-2.5 ${isLightBg ? 'bg-black/20' : 'bg-white/40'} rounded-full"></div><span>${info.date}</span>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 md:gap-6 mb-2">
                    <div class="bg-black/30 p-3 md:p-5 rounded-[2rem] text-center flex flex-col items-center justify-center border border-white/10 backdrop-blur-sm shadow-inner">
                        <p class="text-[11px] uppercase font-black ${labelContrast} leading-tight mb-2 text-center">Temp<br>Now</p>
                        <p class="text-4xl md:text-5xl elegant-text text-white drop-shadow-lg">${city.temp}°</p>
                    </div>
                    <div class="bg-black/30 p-3 md:p-5 rounded-[2rem] text-center flex flex-col items-center justify-center border border-white/10 backdrop-blur-sm shadow-inner">
                        <p class="text-[11px] uppercase font-black ${labelContrast} leading-tight mb-2 text-center">Humidity<br>Now</p>
                        <p class="text-4xl md:text-5xl elegant-text text-white drop-shadow-lg">${city.humidity}%</p>
                    </div>
                </div>
                <div class="${isLightBg ? 'bg-black/5' : 'bg-white/5'} p-4 rounded-[2.5rem] border border-white/10 mb-2 backdrop-blur-xl">
                    <h4 class="${labelContrast} font-bold text-[10px] text-center mb-3">Three-Day Outlook</h4>
                    <div class="grid grid-cols-3 gap-2">
                        ${dates.map((d, i) => `
                            <div class="text-center py-4 bg-black/40 rounded-[1.5rem] border border-white/10 shadow-lg">
                                <p class="text-[11px] text-orange-100 font-black uppercase tracking-tighter leading-none mb-1">${d.day}</p>
                                <p class="text-[8px] text-white/50 mb-2 uppercase leading-none">${d.date}</p>
                                <div class="text-xl md:text-2xl font-bold mb-2 ${outlookColor} leading-none">
                                    ${city.dailyProb[i+1] > 0 ? city.dailyProb[i+1] + '%' : '☀️'}
                                </div>
                                <div class="flex flex-col items-center leading-tight">
                                    <span class="text-[11px] font-black text-white/95">H: ${Math.round(city.dailyMax[i+1])}°</span>
                                    <span class="text-[10px] font-bold text-white/40 mt-1">L: ${Math.round(city.dailyMin[i+1])}°</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="flex justify-between items-center bg-black/40 p-4 rounded-[2rem] border border-white/10 shadow-inner">
                    <div class="text-center flex-1">
                        <p class="text-[10px] uppercase font-black ${labelContrast} mb-1">Today's High</p>
                        <p class="text-2xl md:text-3xl elegant-text text-white leading-none">${city.high}°</p>
                    </div>
                    <div class="h-8 md:h-10 w-px bg-white/20"></div>
                    <div class="text-center flex-1">
                        <p class="text-[10px] uppercase font-black ${labelContrast} mb-1">Today's Low</p>
                        <p class="text-2xl md:text-3xl elegant-text text-white/50 leading-none">${city.low}°</p>
                    </div>
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; 
        }

        function closeModal() { 
            document.getElementById('detail-modal').classList.remove('active'); 
            document.body.style.overflow = ''; 
        }

        window.onload = initialize;
    </script>
</body>
</html>
